<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="talentapp:project_verification" content="a91fdd0e11b6144c52291b122dab6669cfab19e97790808c368c2db25eb4469214c66050be56b4678276c7cc5d77efbf680e2b3473e3cf092a2e4ae6d258a50a">
  <title>BasePulse — AI digest for Base ecosystem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 640px; padding: 40px 24px; text-align: center; }
    .badge { display: inline-block; background: #0052FF; color: white; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 32px; }
    h1 { font-size: 48px; font-weight: 700; margin-bottom: 16px; }
    h1 span { color: #0052FF; }
    p { color: #888; font-size: 18px; line-height: 1.6; margin-bottom: 40px; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn { padding: 12px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; text-decoration: none; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #0052FF; color: white; }
    .btn-secondary { background: #1a1a1a; color: white; border: 1px solid #333; }
    .stats { margin-top: 60px; display: flex; gap: 40px; justify-content: center; }
    .stat { text-align: center; }
    .stat-num { font-size: 32px; font-weight: 700; color: #0052FF; }
    .stat-label { font-size: 13px; color: #555; margin-top: 4px; }
    footer { margin-top: 60px; color: #333; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🔵 Built on Base</div>
    <h1>Base<span>Pulse</span></h1>
    <p>AI-powered daily digest of Base ecosystem activity. DeFi trends, NFT activity, developer metrics — automatically every day.</p>
    <div class="links">
      <a href="https://github.com/Zganz404/base-pulse" class="btn btn-primary">View on GitHub</a>
      <a href="https://github.com/Zganz404/base-pulse/tree/main/reports" class="btn btn-secondary">📊 Reports</a>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num">365</div>
        <div class="stat-label">reports per year</div>
      </div>
      <div class="stat">
        <div class="stat-num">100%</div>
        <div class="stat-label">automated</div>
      </div>
      <div class="stat">
        <div class="stat-num">free</div>
        <div class="stat-label">open source</div>
      </div>
    </div>
    <footer>MIT License · Made by <a href="https://github.com/Zganz404" style="color:#0052FF">Zganz404</a></footer>
  </div>
</body>
</html>
