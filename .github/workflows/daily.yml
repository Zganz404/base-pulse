name: BasePulse Daily Digest

on:
  schedule:
    - cron: '15 7 * * *'
    - cron: '15 9 * * *'
    - cron: '15 11 * * *'
    - cron: '15 13 * * *'
    - cron: '15 21 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Check if already ran today
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          if ls reports/report-${TODAY}-*.md 2>/dev/null | grep -q .; then
            echo "already_ran=true" >> $GITHUB_OUTPUT
          else
            echo "already_ran=false" >> $GITHUB_OUTPUT
          fi

      - name: Run BasePulse bot
        if: steps.check.outputs.already_ran == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TALENT_WALLET: ${{ secrets.TALENT_WALLET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node bot.js

      - name: Commit and push
        if: steps.check.outputs.already_ran == 'false'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/Zganz404/base-pulse.git"
          git add reports/
          git stash
          git pull origin main --rebase
          git stash pop
          git diff --staged --quiet || git commit -m "📊 Daily report $(date +'%Y-%m-%d')"
          git push origin main

      - name: Already ran today
        if: steps.check.outputs.already_ran == 'true'
        run: echo "Report already exists for today, skipping."
